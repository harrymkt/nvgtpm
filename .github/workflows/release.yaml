name: Build and Release Executables
on:
  release:
    types: [published]
jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: nvgtpm.exe
            asset_name: nvgtpm-windows.exe
          - os: macos-latest
            artifact_name: nvgtpm
            asset_name: nvgtpm-macos
          - os: ubuntu-latest
            artifact_name: nvgtpm
            asset_name: nvgtpm-linux
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python Environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install Bundling Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      - name: Package Binary Executable via PyInstaller
        run: |
          pyinstaller --onefile --name nvgtpm --collect-submodules src nvgtpm.py
      - name: Upload Binary Artifact for Release Job
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 1
  release:
    name: Generate GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Download Windows Binary
        uses: actions/download-artifact@v8
        with:
          name: nvgtpm-windows.exe
          path: ./downloads/windows
      - name: Download macOS Binary
        uses: actions/download-artifact@v8
        with:
          name: nvgtpm-macos
          path: ./downloads/macos
      - name: Download Linux Binary
        uses: actions/download-artifact@v8
        with:
          name: nvgtpm-linux
          path: ./downloads/linux
      - name: Structure Assets for Deployment
        run: |
          mkdir -p release
          mv ./downloads/windows/nvgtpm.exe ./release/nvgtpm-windows.exe
          mv ./downloads/macos/nvgtpm ./release/nvgtpm-macos
          mv ./downloads/linux/nvgtpm ./release/nvgtpm-linux
          chmod +x ./release/nvgtpm-macos
          chmod +x ./release/nvgtpm-linux
      - name: Publish Automated GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/nvgtpm-windows.exe
            release/nvgtpm-macos
            release/nvgtpm-linux
          draft: false
          prerelease: false
